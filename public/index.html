<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Spine</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body x-data x-cloak>
  <!-- Session check wrapper: attempts /api/books on load; if 200, restore session -->
  <div x-init="(async () => {
    const res = await fetch('/api/books')
    if (res.ok) {
      $store.library.books = await res.json()
      // Restore username from session so progressDB keys match
      const meRes = await fetch('/auth/me')
      if (meRes.ok) {
        const me = await meRes.json()
        $store.auth.username = me.username
        $store.auth.role = me.role
      }
      $store.auth.loggedIn = true
      const savedView = sessionStorage.getItem('spine-view')
      const restoreView = (savedView === 'admin' && $store.auth.role === 'admin') ? 'admin' : 'library'
      $store.app.setView(restoreView)
      history.replaceState({ view: restoreView }, '')
      // D-14: Proactively cache all cover art for offline availability
      Alpine.store('downloads').cacheAllCovers($store.library.books)
      // Quirk 1: restore last-played book position without auto-playing
      try {
        const lastBookRaw = localStorage.getItem('spine-last-book')
        if (lastBookRaw) {
          const lastBook = JSON.parse(lastBookRaw)
          const book = $store.library.books.find(b => b.id === lastBook.id)
          if (book) {
            const bookRes = await fetch('/api/books/' + book.id)
            if (bookRes.ok) {
              const fullBook = await bookRes.json()
              Alpine.store('player').book = fullBook
              const el = window._spineAudio
              if (el) {
                el.src = '/api/books/' + fullBook.id + '/audio'
                el.addEventListener('canplay', () => {
                  el.currentTime = lastBook.position || 0
                  if (fullBook.chapters && fullBook.chapters.length > 0) {
                    Alpine.store('player').currentChapterIdx = getCurrentChapterIdx(el.currentTime, fullBook.chapters)
                  }
                  // Do not auto-play — user taps play to resume
                }, { once: true })
                el.load()
              }
            }
          }
        }
      } catch { /* non-fatal — missing localStorage or corrupt entry */ }
    }
  })()">

    <!-- ========== Login View ========== -->
    <div x-show="$store.app.view === 'login'" class="login-page">
      <div class="login-card" x-data="{ username: '', password: '', error: '', submitting: false }">
        <h1>Spine</h1>
        <form @submit.prevent="(async () => {
          error = ''
          submitting = true
          try {
            const res = await fetch('/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password })
            })
            if (res.ok) {
              const data = await res.json()
              $store.auth.loggedIn = true
              $store.auth.username = username
              $store.auth.role = data.role
              $store.app.setView('library')
              history.replaceState({ view: 'library' }, '')
              await $store.library.loadBooks()
            } else if (res.status === 401) {
              error = 'Invalid username or password.'
            } else {
              error = 'Could not reach the server. Try again.'
            }
          } catch (e) {
            error = 'Could not reach the server. Try again.'
          } finally {
            submitting = false
          }
        })()">
          <div class="form-group">
            <input
              type="text"
              class="form-input"
              placeholder="Username"
              x-model="username"
              required
              autocomplete="username"
            >
          </div>
          <div class="form-group">
            <input
              type="password"
              class="form-input"
              placeholder="Password"
              x-model="password"
              required
              autocomplete="current-password"
            >
          </div>
          <button type="submit" class="btn-primary" :disabled="submitting">Log In</button>
          <div class="login-error" x-show="error" x-text="error"></div>
        </form>
      </div>
    </div>

    <!-- ========== Top Navigation Bar (library + detail + admin views) ========== -->
    <nav class="nav-bar" x-show="$store.app.view === 'library' || $store.app.view === 'detail' || $store.app.view === 'admin'">
      <a class="nav-brand" href="#" @click.prevent="$store.app.setView('library')">Spine</a>
      <div class="nav-right">
        <span class="offline-indicator" x-show="$store.app.isOffline" title="You are offline">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/><path d="M5 12.55a10.94 10.94 0 015.17-2.39"/><path d="M10.71 5.05A16 16 0 0122.56 9"/><path d="M1.42 9a15.91 15.91 0 014.7-2.88"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        </span>
        <template x-if="$store.auth.loggedIn && $store.auth.role === 'admin'">
          <a class="nav-admin-link"
             :class="{ 'nav-active': $store.app.view === 'admin' }"
             @click.prevent="$store.app.setView('admin')"
             href="#">Users</a>
        </template>
        <span class="nav-username" x-text="$store.auth.username"></span>
        <button class="nav-logout" @click="(async () => {
          await fetch('/auth/logout', { method: 'POST' })
          if (window._spineAudio) { window._spineAudio.pause() }
          $store.player.book = null
          $store.player._clearSaveInterval()
          $store.player._clearMediaMetadata()
          $store.auth.loggedIn = false
          $store.auth.username = ''
          $store.auth.role = ''
          $store.app.setView('login')
          $store.library.books = []
          $store.library.query = ''
          $store.library.selectedBook = null
        })()">Log out</button>
      </div>
    </nav>

    <!-- ========== Library View ========== -->
    <div x-show="$store.app.view === 'library'" class="library-container">

      <!-- Search bar -->
      <div class="search-bar">
        <div class="search-input-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
          </svg>
          <input
            type="text"
            class="search-input"
            placeholder="Search by title or author…"
            x-model="$store.library.query"
            aria-label="Search library"
            autocomplete="off"
          >
          <button
            class="search-clear"
            x-show="$store.library.query"
            @click="$store.library.query = ''"
            aria-label="Clear search"
          >
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M4.646 4.646a.5.5 0 01.708 0L8 7.293l2.646-2.647a.5.5 0 01.708.708L8.707 8l2.647 2.646a.5.5 0 01-.708.708L8 8.707l-2.646 2.647a.5.5 0 01-.708-.708L7.293 8 4.646 5.354a.5.5 0 010-.708z"/>
            </svg>
          </button>
        </div>

        <!-- Downloaded filter toggle (D-07) -->
        <button
          class="filter-downloaded"
          :class="{ active: $store.downloads.showDownloadedOnly }"
          @click="$store.downloads.toggleDownloadedFilter()"
          x-show="$store.downloads.getDownloadedCount() > 0"
          aria-label="Show downloaded books only"
        >
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 01.5.5v2.5a1 1 0 001 1h12a1 1 0 001-1v-2.5a.5.5 0 011 0v2.5a2 2 0 01-2 2H2a2 2 0 01-2-2v-2.5a.5.5 0 01.5-.5z"/><path d="M7.646 11.854a.5.5 0 00.708 0l3-3a.5.5 0 00-.708-.708L8.5 10.293V1.5a.5.5 0 00-1 0v8.793L5.354 8.146a.5.5 0 10-.708.708l3 3z"/></svg>
          Downloaded
        </button>

        <!-- Storage summary (D-08): shown only when filter is active -->
        <span
          class="storage-summary"
          x-show="$store.downloads.showDownloadedOnly"
          x-text="$store.downloads.getDownloadedCount() + ' book' + ($store.downloads.getDownloadedCount() !== 1 ? 's' : '') + ' -- ' + formatBytes($store.downloads.getTotalSizeBytes())"
        ></span>
      </div>

      <!-- Loading skeleton -->
      <div class="library-grid" x-show="$store.library.loading">
        <template x-for="i in 8" :key="i">
          <div class="skeleton-card">
            <div class="skeleton-cover"></div>
            <div class="skeleton-text">
              <div class="skeleton-line"></div>
              <div class="skeleton-line short"></div>
            </div>
          </div>
        </template>
      </div>

      <!-- Book grid -->
      <div class="library-grid" x-show="!$store.library.loading">

        <!-- Empty library state -->
        <div class="empty-state" x-show="$store.library.books.length === 0 && !$store.library.query">
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="8" y="6" width="32" height="36" rx="2"/>
            <line x1="16" y1="14" x2="32" y2="14"/>
            <line x1="16" y1="22" x2="32" y2="22"/>
            <line x1="16" y1="30" x2="24" y2="30"/>
          </svg>
          <h2>Your library is empty</h2>
          <p>Add .m4b files to your library folder and restart the scanner.</p>
        </div>

        <!-- No search results state -->
        <div class="empty-state" x-show="$store.library.filteredBooks.length === 0 && $store.library.query">
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="20" cy="20" r="14"/>
            <line x1="30" y1="30" x2="42" y2="42"/>
          </svg>
          <h2>No books match</h2>
          <p>Try a different title or author.</p>
        </div>

        <!-- Book cards -->
        <template x-for="book in $store.library.filteredBooks" :key="book.id">
          <div
            class="book-card"
            :class="{ 'offline-dim': $store.app.isOffline && !$store.downloads.isDownloaded(book.id) }"
            @click="$store.library.selectBook(book.id)"
            role="button" tabindex="0"
            @keydown.enter="$store.library.selectBook(book.id)"
          >
            <div class="cover-container">
              <img
                x-show="book.cover_url"
                :src="book.cover_url"
                :alt="book.title"
                loading="lazy"
                @error="$el.style.display='none'; $el.nextElementSibling.style.display='flex'"
              >
              <div class="cover-placeholder" :style="book.cover_url ? 'display:none' : ''">
                <span x-text="book.title ? book.title.charAt(0).toUpperCase() : '?'"></span>
              </div>

              <!-- Download progress overlay on cover (D-03) -->
              <div
                class="download-overlay"
                x-show="$store.downloads.isDownloading(book.id)"
                @click.stop="$store.downloads.cancelDownload(book.id)"
                title="Cancel download"
              >
                <div class="download-overlay-text" x-text="Math.round($store.downloads.getProgress(book.id) * 100) + '%'"></div>
              </div>

              <!-- Downloaded badge on cover (D-06) -->
              <div class="downloaded-badge" x-show="$store.downloads.isDownloaded(book.id)" aria-label="Downloaded">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13.854 3.646a.5.5 0 010 .708l-7 7a.5.5 0 01-.708 0l-3.5-3.5a.5.5 0 11.708-.708L6.5 10.293l6.646-6.647a.5.5 0 01.708 0z"/></svg>
              </div>
            </div>
            <div class="card-text">
              <div class="card-title" x-text="book.title"></div>
              <div class="card-author" x-text="book.author || 'Unknown Author'"></div>
            </div>
          </div>
        </template>

      </div>
    </div>

    <!-- ========== Book Detail View ========== -->
    <div x-show="$store.app.view === 'detail'" class="detail-container">

      <button class="back-link" @click="history.back()">← Library</button>

      <template x-if="$store.library.selectedBook">
        <div>
          <div class="detail-header">
            <div class="detail-cover">
              <img
                x-show="$store.library.selectedBook.cover_url"
                :src="$store.library.selectedBook.cover_url"
                :alt="$store.library.selectedBook.title"
              >
              <div class="cover-placeholder" x-show="!$store.library.selectedBook.cover_url">
                <span x-text="$store.library.selectedBook.title ? $store.library.selectedBook.title.charAt(0).toUpperCase() : '?'"></span>
              </div>
            </div>
            <div class="detail-meta">
              <h1 x-text="$store.library.selectedBook.title"></h1>
              <div class="author" x-text="$store.library.selectedBook.author || 'Unknown Author'"></div>
              <div class="narrator" x-show="$store.library.selectedBook.narrator" x-text="'Narrated by ' + ($store.library.selectedBook.narrator || '')"></div>
              <div class="duration" x-text="formatDuration($store.library.selectedBook.duration_sec)"></div>
            </div>
          </div>

          <div
            class="detail-description"
            x-show="$store.library.selectedBook.description"
            x-text="$store.library.selectedBook.description"
          ></div>

          <button
            class="btn-play"
            @click="$store.player.play($store.library.selectedBook)"
            x-show="!$store.app.isOffline || $store.downloads.isDownloaded($store.library.selectedBook.id)"
          >Play</button>
          <span
            class="offline-play-notice"
            x-show="$store.app.isOffline && !$store.downloads.isDownloaded($store.library.selectedBook.id)"
          >Download required for offline playback</span>

          <!-- Download controls (D-01: detail view only, D-02: button states) -->
          <div class="download-controls" x-data>
            <!-- Download button: shown when not downloaded and online -->
            <button
              class="btn-download"
              x-show="!$store.downloads.isDownloaded($store.library.selectedBook.id) && !$store.downloads.isDownloading($store.library.selectedBook.id) && !$store.app.isOffline && $store.downloads.states[$store.library.selectedBook.id]?.status !== 'error'"
              @click="$store.downloads.startDownload($store.library.selectedBook)"
            >Download</button>

            <!-- Downloading: progress bar (D-03 in detail view) -->
            <div
              class="download-progress-row"
              x-show="$store.downloads.isDownloading($store.library.selectedBook.id)"
            >
              <div class="download-progress-bar">
                <div class="download-progress-fill" :style="'width:' + Math.round($store.downloads.getProgress($store.library.selectedBook.id) * 100) + '%'"></div>
              </div>
              <span class="download-progress-text" x-text="Math.round($store.downloads.getProgress($store.library.selectedBook.id) * 100) + '%'"></span>
              <button class="btn-download-cancel" @click="$store.downloads.cancelDownload($store.library.selectedBook.id)" title="Cancel download">Cancel</button>
            </div>

            <!-- Downloaded: show size + delete option (D-02, D-09) -->
            <div
              class="download-complete-row"
              x-show="$store.downloads.isDownloaded($store.library.selectedBook.id)"
            >
              <span class="download-status">Downloaded <span x-text="formatBytes($store.downloads.getSizeBytes($store.library.selectedBook.id))"></span></span>
              <button class="btn-download-delete" @click="$store.downloads.deleteDownload($store.library.selectedBook)">Delete Download</button>
            </div>

            <!-- Error state (D-05) -->
            <div
              class="download-error-row"
              x-show="$store.downloads.states[$store.library.selectedBook.id]?.status === 'error'"
            >
              <span class="download-error-text">Download failed</span>
              <button class="btn-download" @click="$store.downloads.startDownload($store.library.selectedBook)">Retry</button>
            </div>

            <!-- Offline: download unavailable (D-12) -->
            <button
              class="btn-download btn-download-disabled"
              x-show="!$store.downloads.isDownloaded($store.library.selectedBook.id) && !$store.downloads.isDownloading($store.library.selectedBook.id) && $store.app.isOffline"
              disabled
            >Available when online</button>
          </div>

          <template x-if="$store.library.selectedBook.chapters && $store.library.selectedBook.chapters.length > 0">
            <div>
              <h3 class="chapter-heading">Chapters</h3>
              <ul class="chapter-list">
                <template x-for="(chapter, idx) in $store.library.selectedBook.chapters" :key="chapter.id">
                  <li class="chapter-row" role="button" style="cursor:pointer" @click="$store.player.jumpToChapter(idx)">
                    <span class="chapter-num" x-text="idx + 1"></span>
                    <span class="chapter-title" x-text="chapter.title"></span>
                    <span class="chapter-duration" x-text="formatChapterDuration(chapter.start_sec, chapter.end_sec)"></span>
                  </li>
                </template>
              </ul>
            </div>
          </template>
        </div>
      </template>

    </div>

    <!-- ========== Admin View — x-if keeps entire component out of DOM when not active ========== -->
    <template x-if="$store.app.view === 'admin'">
    <div class="admin-container"
         x-data="{
           activeTab: 'users',
           scanning: false,
           scanTotal: 0,
           scanScanned: 0,
           scanCurrent: '',
           scanError: '',
           scanSummary: null,
           _scanEs: null,
           async startScan() {
             this.scanError = ''
             this.scanSummary = null
             const res = await fetch('/api/scan', { method: 'POST' })
             if (res.status === 409) {
               this.scanError = 'A scan is already in progress.'
               return
             }
             if (!res.ok) {
               this.scanError = 'Failed to start scan.'
               return
             }
             this.scanning = true
             this.scanScanned = 0
             this.scanTotal = 0
             this.scanCurrent = ''

             const es = new EventSource('/api/scan/progress')
             this._scanEs = es

             es.addEventListener('start', (e) => {
               const d = JSON.parse(e.data)
               this.scanTotal = d.total
               this.scanScanned = 0
             })
             es.addEventListener('file', (e) => {
               const d = JSON.parse(e.data)
               this.scanScanned = d.scanned
               this.scanTotal = d.total
               this.scanCurrent = d.current
             })
             es.addEventListener('done', (e) => {
               const d = JSON.parse(e.data)
               this.scanning = false
               this.scanSummary = d
               this._scanEs = null
               es.close()
               $store.library.loadBooks()
             })
             es.onerror = () => {
               if (this.scanning) {
                 this.scanning = false
                 this.scanError = 'Connection lost during scan.'
               }
               this._scanEs = null
               es.close()
             }
           },
           users: [],
           loading: false,
           statusMsg: '',
           showCreateForm: false,
           createForm: { username: '', password: '', role: 'user', error: '', submitting: false },
           resetState: {},
           deleteState: {},
           async loadUsers() {
             this.loading = true
             try {
               const res = await fetch('/api/users')
               if (res.ok) {
                 this.users = await res.json()
                 this.resetState = {}
                 this.deleteState = {}
               }
             } finally { this.loading = false }
           },
           isCurrentUser(user) { return user.username === $store.auth.username },
           isOnlyAdmin(user) {
             return user.role === 'admin' && this.users.filter(u => u.role === 'admin').length === 1
           },
           formatDate(str) {
             if (!str) return 'Never'
             return new Date(str).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
           },
           formatDateTime(str) {
             if (!str) return 'Never'
             return new Date(str).toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })
           },
           async createUser() {
             this.createForm.error = ''
             if (!this.createForm.username || !this.createForm.password) return
             this.createForm.submitting = true
             try {
               const res = await fetch('/api/users', {
                 method: 'POST',
                 headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify({
                   username: this.createForm.username,
                   password: this.createForm.password,
                   role: this.createForm.role
                 })
               })
               if (res.ok) {
                 const created = this.createForm.username
                 this.createForm.username = ''
                 this.createForm.password = ''
                 this.createForm.role = 'user'
                 this.showCreateForm = false
                 this.statusMsg = `User ${created} created.`
                 setTimeout(() => { this.statusMsg = '' }, 3000)
                 await this.loadUsers()
               } else {
                 const err = await res.json().catch(() => ({}))
                 if (res.status === 409) {
                   this.createForm.error = 'Username already exists. Choose a different username.'
                 } else {
                   this.createForm.error = err.error || 'Failed to create user. Try again.'
                 }
               }
             } finally { this.createForm.submitting = false }
           },
           startDelete(user) {
             this.deleteState = { ...this.deleteState, [user.id]: { confirming: true, timer: null } }
             const timer = setTimeout(() => {
               this.deleteState = { ...this.deleteState, [user.id]: { confirming: false, timer: null } }
             }, 3000)
             this.deleteState[user.id].timer = timer
           },
           async confirmDelete(user) {
             if (this.deleteState[user.id]?.timer) clearTimeout(this.deleteState[user.id].timer)
             this.deleteState = { ...this.deleteState, [user.id]: { confirming: false, deleting: true } }
             try {
               const res = await fetch('/api/users/' + user.id, { method: 'DELETE' })
               if (res.ok) {
                 this.statusMsg = `User ${user.username} deleted.`
                 setTimeout(() => { this.statusMsg = '' }, 3000)
                 await this.loadUsers()
               } else {
                 const err = await res.json().catch(() => ({}))
                 this.statusMsg = err.error || 'Failed to delete user. Try again.'
                 setTimeout(() => { this.statusMsg = '' }, 3000)
                 this.deleteState = { ...this.deleteState, [user.id]: { confirming: false, deleting: false } }
               }
             } catch {
               this.statusMsg = 'Failed to delete user. Try again.'
               setTimeout(() => { this.statusMsg = '' }, 3000)
               this.deleteState = { ...this.deleteState, [user.id]: { confirming: false, deleting: false } }
             }
           },
           openReset(user) {
             this.resetState = { ...this.resetState, [user.id]: { open: true, password: '', saving: false, error: '' } }
           },
           cancelReset(user) {
             this.resetState = { ...this.resetState, [user.id]: null }
           },
           async saveReset(user) {
             const state = this.resetState[user.id]
             if (!state?.password) return
             this.resetState = { ...this.resetState, [user.id]: { ...state, saving: true } }
             try {
               const res = await fetch('/api/users/' + user.id + '/password', {
                 method: 'PATCH',
                 headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify({ password: state.password })
               })
               if (res.ok) {
                 this.resetState = { ...this.resetState, [user.id]: null }
                 this.statusMsg = `Password reset for ${user.username}.`
                 setTimeout(() => { this.statusMsg = '' }, 3000)
               } else {
                 this.resetState = { ...this.resetState, [user.id]: { ...state, saving: false, error: 'Reset failed. Try again.' } }
               }
             } catch {
               this.resetState = { ...this.resetState, [user.id]: { ...state, saving: false, error: 'Reset failed. Try again.' } }
             }
           }
         }"
         x-init="loadUsers()">

      <!-- Tab bar (per D-01) -->
      <div class="admin-tabs">
        <button class="admin-tab-btn" :class="{ 'admin-tab-active': activeTab === 'users' }"
                @click="activeTab = 'users'" type="button">Users</button>
        <button class="admin-tab-btn" :class="{ 'admin-tab-active': activeTab === 'library' }"
                @click="activeTab = 'library'" type="button">Library</button>
      </div>

      <!-- Users tab panel — x-show keeps DOM alive (not x-if, per Pitfall 6 / Phase 7 lesson) -->
      <div x-show="activeTab === 'users'">

      <h1 class="admin-heading">Users</h1>

      <!-- Status message -->
      <div class="admin-status" x-show="statusMsg" x-text="statusMsg" role="status" aria-live="polite"></div>

      <!-- Create user accordion -->
      <button class="btn-toggle-form" @click="showCreateForm = !showCreateForm; createForm.error = ''"
              x-text="showCreateForm ? '− Cancel' : '+ New User'"
              type="button"></button>

      <!-- Create user form (collapsed by default) -->
      <form class="admin-form" @submit.prevent="createUser()" x-show="showCreateForm" x-transition autocomplete="off">
        <!-- Hidden dummy inputs to discourage browser autofill -->
        <input type="text" style="display:none" aria-hidden="true" tabindex="-1">
        <input type="password" style="display:none" aria-hidden="true" tabindex="-1">
        <div class="admin-form-row">
          <input class="form-input" type="text" placeholder="Username" required
                 x-model="createForm.username" aria-label="Username"
                 autocomplete="off">
          <input class="form-input" type="password" placeholder="Password" required
                 x-model="createForm.password" aria-label="Password"
                 autocomplete="new-password">
          <select class="form-input admin-role-select" x-model="createForm.role" aria-label="Role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
          <button class="btn-primary" type="submit" :disabled="createForm.submitting"
                  x-text="createForm.submitting ? 'Creating...' : 'Create User'"></button>
        </div>
        <div class="admin-form-error" x-show="createForm.error" x-text="createForm.error"></div>
      </form>

      <!-- User table -->
      <table class="admin-table">
        <thead>
          <tr>
            <th scope="col">Username</th>
            <th scope="col">Role</th>
            <th scope="col">Created</th>
            <th scope="col">Last Login</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Loading state -->
          <tr x-show="loading">
            <td colspan="5" style="text-align:center; color:var(--color-text-muted)">Loading users...</td>
          </tr>
          <!-- Empty state -->
          <tr x-show="!loading && users.length === 0">
            <td colspan="5" style="text-align:center">
              <strong>No users yet.</strong><br>
              <span style="color:var(--color-text-muted)">Create the first user account using the form above.</span>
            </td>
          </tr>
          <!-- User rows -->
          <template x-for="user in users" :key="user.id">
            <tr>
              <td>
                <span x-text="user.username"></span>
                <span class="admin-badge-you" x-show="isCurrentUser(user)">(You)</span>
              </td>
              <td><span class="admin-badge-role" x-text="user.role"></span></td>
              <td style="color:var(--color-text-muted)" x-text="formatDate(user.created_at)"></td>
              <td style="color:var(--color-text-muted)" x-text="formatDateTime(user.last_login_at)"></td>
              <td>
                <!-- Actions: normal state (not in reset mode) -->
                <span x-show="!resetState[user.id]?.open">
                  <!-- Reset password button — not shown on own row -->
                  <button class="btn-action" @click="openReset(user)"
                          x-show="!isCurrentUser(user)">Reset Password</button>

                  <!-- Delete button -->
                  <template x-if="!isCurrentUser(user)">
                    <span>
                      <!-- Disabled: last admin -->
                      <button class="btn-delete btn-delete-disabled"
                              x-show="isOnlyAdmin(user)"
                              disabled
                              title="Cannot delete the last admin"
                              aria-label="Cannot delete the last admin">Delete</button>

                      <!-- Normal delete flow -->
                      <span x-show="!isOnlyAdmin(user)">
                        <!-- Default state -->
                        <button class="btn-delete"
                                x-show="!deleteState[user.id]?.confirming && !deleteState[user.id]?.deleting"
                                @click="startDelete(user)">Delete</button>
                        <!-- Confirm state -->
                        <button class="btn-delete btn-delete-confirm"
                                x-show="deleteState[user.id]?.confirming"
                                @click="confirmDelete(user)"
                                aria-pressed="true">Confirm?</button>
                        <!-- Deleting state -->
                        <button class="btn-delete" disabled
                                x-show="deleteState[user.id]?.deleting">Deleting...</button>
                      </span>
                    </span>
                  </template>
                </span>

                <!-- Reset password inline form — x-if keeps x-model out of DOM until state exists -->
                <template x-if="resetState[user.id]?.open">
                  <span>
                    <input class="admin-reset-input" type="password" placeholder="New password"
                           x-model="resetState[user.id].password"
                           :aria-label="'New password for ' + user.username">
                    <button class="btn-action" @click="saveReset(user)"
                            :disabled="resetState[user.id]?.saving"
                            x-text="resetState[user.id]?.saving ? 'Saving...' : 'Save Password'"></button>
                    <button class="btn-action" @click="cancelReset(user)">Keep Password</button>
                    <span class="admin-form-error" x-show="resetState[user.id]?.error"
                          x-text="resetState[user.id]?.error"></span>
                  </span>
                </template>
              </td>
            </tr>
          </template>
        </tbody>
      </table>

      </div><!-- end Users tab panel -->

      <!-- Library tab panel (per D-02) -->
      <div x-show="activeTab === 'library'">
        <h1 class="admin-heading">Library</h1>

        <!-- Error message -->
        <div class="admin-status" x-show="scanError" x-text="scanError" role="alert"></div>

        <!-- Rescan button (per D-03, D-06) -->
        <button class="btn-primary admin-scan-btn"
                @click="startScan()"
                :disabled="scanning"
                x-text="scanning ? 'Scan in progress' : 'Rescan Library'"
                type="button"></button>

        <!-- Progress bar (per D-04) -->
        <div class="admin-scan-progress" x-show="scanning" x-transition>
          <div class="admin-scan-progress-bar">
            <div class="admin-scan-progress-fill"
                 :style="'width:' + (scanTotal > 0 ? Math.round((scanScanned / scanTotal) * 100) : 0) + '%'"></div>
          </div>
          <div class="admin-scan-progress-text">
            Scanning... <span x-text="scanScanned"></span> / <span x-text="scanTotal"></span> files
          </div>
          <div class="admin-scan-current" x-show="scanCurrent"
               x-text="scanCurrent.split('/').pop()"></div>
        </div>

        <!-- Scan summary (per D-12, D-14) -->
        <div class="admin-scan-summary" x-show="scanSummary && !scanning">
          <span>Scan complete:</span>
          <span x-text="(scanSummary?.newBooks ?? 0) + ' new'"></span>,
          <span x-text="(scanSummary?.updatedBooks ?? 0) + ' updated'"></span>,
          <span x-text="(scanSummary?.missing ?? 0) + ' missing'"></span>,
          <span x-text="(scanSummary?.notEnriched ?? 0) + ' not enriched'"></span>
        </div>
      </div><!-- end Library tab panel -->

    </div>
    </template>

  </div><!-- end session-check wrapper -->

  <!-- ========== Audio Player Bar ========== -->
  <div class="player-bar" x-data x-show="$store.player.book" x-init="$store.player.initAudio($refs.audio)">
    <audio x-ref="audio" preload="auto"></audio>

    <!-- Thin chapter progress bar at top of collapsed player -->
    <div class="player-progress-strip">
      <div class="player-progress-fill" :style="'width:' + (
        $store.player.currentChapter
          ? Math.round(Math.max(0, Math.min(1, ($store.player.currentTime - $store.player.currentChapter.start_sec) / ($store.player.currentChapter.end_sec - $store.player.currentChapter.start_sec))) * 100)
          : ($store.player.duration > 0 ? Math.round($store.player.currentTime / $store.player.duration * 100) : 0)
      ) + '%'"></div>
    </div>

    <!-- Collapsed bar (per D-01): play/pause, title, chapter, time, expand toggle -->
    <div class="player-collapsed" @click="$store.player.expanded = !$store.player.expanded">
      <button class="player-btn" @click.stop="$store.player.togglePlay()" :aria-label="$store.player.playing ? 'Pause' : 'Play'">
        <!-- Play icon (shown when paused) -->
        <svg x-show="!$store.player.playing" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <!-- Pause icon (shown when playing) -->
        <svg x-show="$store.player.playing" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <div class="player-info">
        <span class="player-title" x-text="$store.player.book?.title"></span>
        <span class="player-chapter" x-text="$store.player.currentChapter?.title || ''"></span>
      </div>
      <span class="player-time" x-text="formatTime($store.player.currentTime)"></span>
      <button class="player-btn player-goto-btn" @click.stop="(async () => {
        await $store.library.selectBook($store.player.book.id)
      })()" aria-label="Go to book detail" title="Go to book detail">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V14H9V4.804z"/></svg>
      </button>
      <button class="player-btn player-expand-btn" @click.stop="$store.player.expanded = !$store.player.expanded" :aria-label="$store.player.expanded ? 'Collapse player' : 'Expand player'">
        <svg x-show="!$store.player.expanded" width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
        <svg x-show="$store.player.expanded" width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z"/></svg>
      </button>
    </div>

    <!-- Expanded panel (per D-02) -->
    <div class="player-expanded" x-show="$store.player.expanded" x-transition>
      <!-- Seek bar — chapter-relative (per D-09, Quirk 2) -->
      <div class="player-seek-row">
        <span class="seek-time" x-text="formatTime($store.player.currentChapter ? $store.player.currentTime - $store.player.currentChapter.start_sec : $store.player.currentTime)"></span>
        <input type="range" class="seek-bar" min="0"
          :max="$store.player.currentChapter ? ($store.player.currentChapter.end_sec - $store.player.currentChapter.start_sec) : $store.player.duration"
          :value="$store.player.currentChapter ? ($store.player.currentTime - $store.player.currentChapter.start_sec) : $store.player.currentTime"
          step="1"
          @input="$store.player.seek(($store.player.currentChapter ? $store.player.currentChapter.start_sec : 0) + parseFloat($event.target.value))"
          aria-label="Seek within chapter">
        <span class="seek-time seek-time-remaining" x-text="'-' + formatTime(
          $store.player.currentChapter
            ? Math.max(0, $store.player.currentChapter.end_sec - $store.player.currentTime)
            : Math.max(0, $store.player.duration - $store.player.currentTime)
        )"></span>
      </div>

      <!-- Playback controls row -->
      <div class="player-controls-row">
        <button class="player-btn" @click="$store.player.skip(-30)" aria-label="Skip back 30 seconds">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="9" y="16" font-size="8" fill="currentColor">30</text></svg>
        </button>
        <button class="player-btn player-btn-lg" @click="$store.player.togglePlay()" :aria-label="$store.player.playing ? 'Pause' : 'Play'">
          <svg x-show="!$store.player.playing" width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg x-show="$store.player.playing" width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="player-btn" @click="$store.player.skip(30)" aria-label="Skip forward 30 seconds">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="9" y="16" font-size="8" fill="currentColor">30</text></svg>
        </button>
      </div>

      <!-- Speed selector (per D-07) -->
      <div class="player-option-row">
        <label class="player-option-label">Speed</label>
        <select class="player-select" :value="$store.player.speed" @change="$store.player.setSpeed(parseFloat($event.target.value))">
          <option value="1">1.0x</option>
          <option value="1.2">1.2x</option>
          <option value="1.4">1.4x</option>
          <option value="1.6">1.6x</option>
          <option value="1.8">1.8x</option>
          <option value="2">2.0x</option>
        </select>
      </div>

      <!-- Sleep timer (per D-08) -->
      <div class="player-option-row">
        <label class="player-option-label">
          Sleep Timer
          <span class="sleep-active-indicator" x-show="$store.player.sleepMode" x-text="
            $store.player.sleepMode === 'chapter' ? '(end of chapter)' :
            (typeof $store.player.sleepMode === 'number' ? '(' + $store.player.sleepMode + ' min)' : '')
          "></span>
        </label>
        <div class="sleep-controls">
          <select class="player-select" @change="
            const v = $event.target.value;
            if (v === 'off') $store.player.cancelSleepTimer();
            else if (v === 'chapter') $store.player.setSleepTimer('chapter');
            else $store.player.setSleepTimer(parseInt(v));
          " :value="$store.player.sleepMode === null ? 'off' : ($store.player.sleepMode === 'chapter' ? 'chapter' : String($store.player.sleepMode))">
            <option value="off">Off</option>
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15">15 min</option>
            <option value="30">30 min</option>
            <option value="60">60 min</option>
            <option value="chapter">End of chapter</option>
          </select>
        </div>
      </div>

      <!-- Chapter list in expanded panel (per D-02, D-04) -->
      <div class="player-chapters">
        <h4 class="player-chapters-heading">Chapters</h4>
        <ul class="player-chapter-list">
          <template x-for="(ch, idx) in ($store.player.book?.chapters || [])" :key="ch.id">
            <li class="player-chapter-row" :class="{ 'active-chapter': idx === $store.player.currentChapterIdx }" @click="$store.player.jumpToChapter(idx)">
              <span class="chapter-num" x-text="idx + 1"></span>
              <span class="chapter-title" x-text="ch.title"></span>
              <span class="chapter-duration" x-text="formatChapterDuration(ch.start_sec, ch.end_sec)"></span>
            </li>
          </template>
        </ul>
      </div>
    </div>
  </div>

  <script src="/player-utils.js"></script>
  <script>
    // ============================================================
    // progressDB — IndexedDB wrapper for per-user playback progress
    // ============================================================
    const progressDB = (() => {
      const DB_NAME = 'spine-progress'
      const DB_VERSION = 1
      const STORE = 'progress'
      let _db = null

      function open() {
        if (_db) return Promise.resolve(_db)
        return new Promise((resolve, reject) => {
          const req = indexedDB.open('spine-progress', 1)
          req.onupgradeneeded = (e) => {
            e.target.result.createObjectStore(STORE)
          }
          req.onsuccess = (e) => {
            _db = e.target.result
            resolve(_db)
          }
          req.onerror = (e) => reject(e.target.error)
        })
      }

      function key(username, bookId) {
        return progressKey(username, bookId)
      }

      async function get(username, bookId) {
        const db = await open()
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, 'readonly')
          const req = tx.objectStore(STORE).get(key(username, bookId))
          req.onsuccess = (e) => resolve(e.target.result || null)
          req.onerror = (e) => reject(e.target.error)
        })
      }

      async function save(username, bookId, data) {
        const db = await open()
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, 'readwrite')
          const req = tx.objectStore(STORE).put(data, key(username, bookId))
          req.onsuccess = () => resolve()
          req.onerror = (e) => reject(e.target.error)
        })
      }

      return { open, key, get, save }
    })()

    window.addEventListener('online', () => { if (window.Alpine) Alpine.store('app').isOffline = false })
    window.addEventListener('offline', () => { if (window.Alpine) Alpine.store('app').isOffline = true })

    // Android back gesture: push history state on view transitions so back swipe doesn't exit the app
    window.addEventListener('popstate', (e) => {
      if (!window.Alpine) return
      const view = (e.state && e.state.view) || 'library'
      Alpine.store('app').setView(view)
    })

    document.addEventListener('alpine:init', () => {
      Alpine.store('auth', {
        loggedIn: false,
        username: '',
        role: ''
      })

      Alpine.store('app', {
        view: 'login',
        isOffline: !navigator.onLine,
        setView(v) {
          this.view = v
          if (v === 'admin') {
            sessionStorage.setItem('spine-view', 'admin')
          } else {
            sessionStorage.removeItem('spine-view')
          }
        }
      })

      Alpine.store('library', {
        books: [],
        query: '',
        selectedBook: null,
        loading: false,

        async loadBooks() {
          this.loading = true
          try {
            const res = await fetch('/api/books')
            if (res.status === 401) {
              Alpine.store('auth').loggedIn = false
              Alpine.store('app').setView('login')
              return
            }
            this.books = await res.json()
            // D-14: Proactively cache all cover art for offline availability
            Alpine.store('downloads').cacheAllCovers(this.books)
          } catch (e) {
            console.error('Failed to load books:', e)
          } finally {
            this.loading = false
          }
        },

        async selectBook(id) {
          try {
            const res = await fetch('/api/books/' + id)
            if (res.status === 401) {
              Alpine.store('auth').loggedIn = false
              Alpine.store('app').setView('login')
              return
            }
            this.selectedBook = await res.json()
            Alpine.store('app').setView('detail')
            history.pushState({ view: 'detail' }, '')
          } catch (e) {
            console.error('Failed to load book:', e)
          }
        },

        get filteredBooks() {
          let books = this.books
          // Apply search filter
          if (this.query) {
            const q = this.query.toLowerCase()
            books = books.filter(b =>
              b.title.toLowerCase().includes(q) ||
              (b.author && b.author.toLowerCase().includes(q))
            )
          }
          // Apply "Downloaded" filter (D-07)
          const dl = Alpine.store('downloads')
          if (dl && dl.showDownloadedOnly) {
            books = books.filter(b => dl.isDownloaded(b.id))
          }
          return books
        }
      })

      Alpine.store('player', {
        book: null,
        playing: false,
        currentTime: 0,
        duration: 0,
        speed: 1.0,
        currentChapterIdx: 0,
        expanded: false,
        sleepTimer: null,
        sleepMode: null,
        sleepTimerEndsAt: null,
        saveInterval: null,
        positionInterval: null,
        _prevChapterIdx: -1,

        get currentChapter() {
          if (!this.book || !this.book.chapters) return null
          return this.book.chapters[this.currentChapterIdx] || null
        },

        initAudio(el) {
          window._spineAudio = el

          el.addEventListener('timeupdate', () => {
            this.currentTime = el.currentTime
            if (this.book && this.book.chapters) {
              this.currentChapterIdx = getCurrentChapterIdx(el.currentTime, this.book.chapters)
            }
            if (this.currentChapterIdx !== this._prevChapterIdx) {
              this._prevChapterIdx = this.currentChapterIdx
              this._setMediaMetadata()
            }
            // End-of-chapter sleep timer (per D-08)
            if (this.sleepMode === 'chapter' && this.currentChapter) {
              if (this.currentTime >= this.currentChapter.end_sec - 0.5) {
                this._sleepStop()
              }
            }
          })

          el.addEventListener('pause', () => {
            this.playing = false
            this._clearSaveInterval()
            this._clearPositionInterval()
            this._saveProgress()
          })

          el.addEventListener('ended', () => {
            this.playing = false
            this._clearSaveInterval()
            this._clearPositionInterval()
            this._saveProgress()
          })

          el.addEventListener('loadedmetadata', () => {
            this.duration = el.duration
          })
        },

        async play(book) {
          // Book-switch confirmation (per D-05)
          if (this.book && this.book.id !== book.id && this.playing) {
            const confirmed = confirm('Switch to "' + book.title + '"? Your place in "' + this.book.title + '" is saved.')
            if (!confirmed) return
          }
          this.book = book
          const el = window._spineAudio
          el.src = '/api/books/' + book.id + '/audio'

          const saved = await progressDB.get(Alpine.store('auth').username, book.id)

          el.addEventListener('canplay', () => {
            if (saved) {
              el.currentTime = saved.timestamp
              this.currentChapterIdx = saved.chapterIdx
            }
            el.playbackRate = saved ? saved.speed : 1.0
            this.speed = el.playbackRate
            el.play()
            this.playing = true
            this._startSaveInterval()
            this._prevChapterIdx = this.currentChapterIdx
            this._setMediaMetadata()
            this._startPositionInterval()
          }, { once: true })

          el.load()
        },

        togglePlay() {
          const el = window._spineAudio
          if (!el) return
          if (this.playing) {
            el.pause()
          } else {
            el.play()
            this.playing = true
            this._startSaveInterval()
            this._startPositionInterval()
            this._updatePositionState()
          }
        },

        skip(seconds) {
          const el = window._spineAudio
          if (!el) return
          el.currentTime = clampSkip(el.currentTime, seconds, el.duration)
        },

        setSpeed(speed) {
          this.speed = speed
          const el = window._spineAudio
          if (el) el.playbackRate = speed
          this._saveProgress()
        },

        jumpToChapter(chapterIdx) {
          if (!this.book || !this.book.chapters) return
          const ch = this.book.chapters[chapterIdx]
          if (!ch) return
          const el = window._spineAudio
          if (!el) return
          el.currentTime = ch.start_sec
          this.currentChapterIdx = chapterIdx
          this._prevChapterIdx = chapterIdx
          this._setMediaMetadata()
          this._updatePositionState()
          if (!this.playing) {
            el.play()
            this.playing = true
            this._startSaveInterval()
          }
        },

        seek(time) {
          const el = window._spineAudio
          if (el) el.currentTime = time
        },

        async _saveProgress() {
          if (!this.book) return
          await progressDB.save(
            Alpine.store('auth').username,
            this.book.id,
            {
              timestamp: this.currentTime,
              chapterIdx: this.currentChapterIdx,
              speed: this.speed,
              updatedAt: Date.now()
            }
          )
          // Track last-played book for session restore on page refresh
          try {
            localStorage.setItem('spine-last-book', JSON.stringify({
              id: this.book.id,
              position: this.currentTime
            }))
          } catch { /* localStorage may be unavailable (private mode, storage full) */ }
        },

        _startSaveInterval() {
          this._clearSaveInterval()
          this.saveInterval = setInterval(() => {
            if (this.playing) this._saveProgress()
          }, 15000)
        },

        _clearSaveInterval() {
          if (this.saveInterval) {
            clearInterval(this.saveInterval)
            this.saveInterval = null
          }
        },

        _setMediaMetadata() {
          if (!('mediaSession' in navigator) || !this.book) return
          const meta = buildMediaMetadata(this.book, this.currentChapterIdx)
          if (!meta) return
          navigator.mediaSession.metadata = new MediaMetadata(meta)
        },

        _updatePositionState() {
          if (!('mediaSession' in navigator) || !this.book || !this.currentChapter) return
          const state = chapterPositionState(this.currentChapter, window._spineAudio?.currentTime ?? 0, window._spineAudio?.playbackRate ?? 1.0)
          if (!state) return
          try {
            navigator.mediaSession.setPositionState(state)
          } catch (e) {
            // Ignore stale-state errors at chapter transitions (Pitfall 1)
          }
        },

        _startPositionInterval() {
          this._clearPositionInterval()
          this.positionInterval = setInterval(() => {
            if (this.playing) this._updatePositionState()
          }, 1000)
        },

        _clearPositionInterval() {
          if (this.positionInterval) {
            clearInterval(this.positionInterval)
            this.positionInterval = null
          }
        },

        _clearMediaMetadata() {
          if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = null
          }
          this._clearPositionInterval()
        },

        setSleepTimer(mode) {
          this._clearSleepTimer()
          this.sleepMode = mode
          if (typeof mode === 'number') {
            this.sleepTimerEndsAt = Date.now() + mode * 60 * 1000
            this.sleepTimer = setTimeout(() => this._sleepStop(), mode * 60 * 1000)
          }
          // 'chapter' mode is detected in _onTimeUpdate — no setTimeout needed
        },

        cancelSleepTimer() {
          this._clearSleepTimer()
          this.sleepMode = null
          this.sleepTimerEndsAt = null
        },

        _sleepStop() {
          window._spineAudio.pause()  // triggers _onPause which saves progress
          this._clearSleepTimer()
          this.sleepMode = null
          this.sleepTimerEndsAt = null
        },

        _clearSleepTimer() {
          if (this.sleepTimer) { clearTimeout(this.sleepTimer); this.sleepTimer = null }
        }
      })

      Alpine.store('downloads', {
        // Reactive state: { [bookId]: { status: 'idle'|'downloading'|'complete'|'error', progress: 0-1, sizeBytes: 0 } }
        states: {},
        _controllers: {},  // AbortControllers, non-reactive (stored directly on this)
        showDownloadedOnly: false,

        getDownloadedCount() {
          return Object.values(this.states).filter(s => s.status === 'complete').length
        },
        getTotalSizeBytes() {
          let total = 0
          for (const s of Object.values(this.states)) {
            if (s.status === 'complete') total += s.sizeBytes
          }
          return total
        },
        toggleDownloadedFilter() {
          this.showDownloadedOnly = !this.showDownloadedOnly
        },

        async init() {
          // Restore from IndexedDB on page load
          const keys = await downloadDB.getAllKeys()
          const cache = await caches.open('spine-audio')
          for (const bookId of keys) {
            const entry = await cache.match('/api/books/' + bookId + '/audio')
            if (entry) {
              const meta = await downloadDB.get(bookId)
              this.states[bookId] = { status: 'complete', progress: 1, sizeBytes: meta ? meta.sizeBytes : 0 }
            } else {
              // Stale IndexedDB entry — cache was evicted
              await downloadDB.delete(bookId)
            }
          }
          // Request persistent storage silently on first load if any downloads exist
          if (keys.length > 0 && navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().catch(() => {})
          }
        },

        // D-14: Proactively cache ALL cover art when library loads.
        // Called fire-and-forget from $store.library.load() after books array arrives.
        // Uses Cache Storage 'spine-covers' matching the service worker's CacheFirst route.
        async cacheAllCovers(books) {
          try {
            const coverCache = await caches.open('spine-covers')
            const urls = books.map(b => '/api/books/' + b.id + '/cover')
            // Filter out already-cached URLs to avoid redundant fetches
            const uncached = []
            for (const url of urls) {
              const existing = await coverCache.match(url)
              if (!existing) uncached.push(url)
            }
            if (uncached.length > 0) {
              await coverCache.addAll(uncached)
            }
          } catch (err) {
            // Fire-and-forget: log but don't block library loading
            console.warn('Cover pre-cache failed (non-fatal):', err.message)
          }
        },

        isDownloaded(bookId) { return this.states[bookId]?.status === 'complete' },
        isDownloading(bookId) { return this.states[bookId]?.status === 'downloading' },
        getProgress(bookId) { return this.states[bookId]?.progress ?? 0 },
        getSizeBytes(bookId) { return this.states[bookId]?.sizeBytes ?? 0 },

        async startDownload(book) {
          if (this.states[book.id]?.status === 'downloading') return
          this.states[book.id] = { status: 'downloading', progress: 0, sizeBytes: 0 }

          const controller = new AbortController()
          this._controllers[book.id] = controller

          try {
            const res = await fetch('/api/books/' + book.id + '/audio', { signal: controller.signal })
            if (!res.ok) throw new Error('HTTP ' + res.status)

            const totalBytes = parseInt(res.headers.get('Content-Length') || '0', 10)
            const reader = res.body.getReader()
            // Keep chunks in closure, NOT on reactive store (Pitfall 6 from research)
            const chunks = []
            let loaded = 0

            while (true) {
              const { done, value } = await reader.read()
              if (done) break
              chunks.push(value)
              loaded += value.byteLength
              this.states[book.id] = {
                status: 'downloading',
                progress: totalBytes > 0 ? loaded / totalBytes : 0,
                sizeBytes: loaded
              }
            }

            // Reassemble and store in Cache Storage
            const blob = new Blob(chunks, { type: 'audio/mp4' })
            const fullResponse = new Response(blob, {
              status: 200,
              headers: {
                'Content-Type': 'audio/mp4',
                'Content-Length': String(loaded),
                'Accept-Ranges': 'bytes',
              }
            })
            const cache = await caches.open('spine-audio')
            await cache.put('/api/books/' + book.id + '/audio', fullResponse)

            await downloadDB.save(book.id, { sizeBytes: loaded, downloadedAt: Date.now() })
            this.states[book.id] = { status: 'complete', progress: 1, sizeBytes: loaded }

            // Request persistent storage on first successful download
            if (navigator.storage && navigator.storage.persist) {
              navigator.storage.persist().catch(() => {})
            }
          } catch (err) {
            if (err.name === 'AbortError') {
              // Cancelled by user — cleanup done in cancelDownload
            } else {
              console.error('Download failed:', err)
              this.states[book.id] = { status: 'error', progress: 0, sizeBytes: 0 }
              await this._cleanup(book.id)
            }
          } finally {
            delete this._controllers[book.id]
          }
        },

        async cancelDownload(bookId) {
          const controller = this._controllers[bookId]
          if (controller) controller.abort()
          await this._cleanup(bookId)
          this.states[bookId] = { status: 'idle', progress: 0, sizeBytes: 0 }
        },

        async deleteDownload(book) {
          // D-10: native confirm() dialog
          const size = formatBytes(this.states[book.id]?.sizeBytes || 0)
          if (!confirm('Delete download for ' + book.title + '? (' + size + ')')) return
          await this._cleanup(book.id)
          this.states[book.id] = { status: 'idle', progress: 0, sizeBytes: 0 }
        },

        async _cleanup(bookId) {
          const cache = await caches.open('spine-audio')
          await cache.delete('/api/books/' + bookId + '/audio')
          await downloadDB.delete(bookId)
        }
      })
    })

    function formatDuration(sec) {
      const h = Math.floor(sec / 3600)
      const m = Math.floor((sec % 3600) / 60)
      return h + 'h ' + m + 'm'
    }

    function formatChapterDuration(startSec, endSec) {
      const dur = endSec - startSec
      const m = Math.floor(dur / 60)
      const s = Math.floor(dur % 60)
      return m + ':' + (s < 10 ? '0' : '') + s
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(err => console.warn('[SW] Registration failed:', err))
      })
    }

    // Keyboard shortcuts (per D-14)
    document.addEventListener('keydown', (e) => {
      // Don't intercept when typing in form inputs (per research Pitfall 4)
      if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return
      const player = Alpine.store('player')
      if (!player.book) return

      switch (e.code) {
        case 'Space':
          e.preventDefault()  // prevent page scroll
          player.togglePlay()
          break
        case 'ArrowLeft':
          e.preventDefault()
          player.skip(-10)  // per D-14: arrow keys seek 10s
          break
        case 'ArrowRight':
          e.preventDefault()
          player.skip(10)
          break
      }
    })

    // Media Session handlers (per D-14: play, pause, nexttrack, previoustrack)
    if ('mediaSession' in navigator) {
      navigator.mediaSession.setActionHandler('play', () => {
        const player = Alpine.store('player')
        if (player.book && !player.playing) player.togglePlay()
      })
      navigator.mediaSession.setActionHandler('pause', () => {
        const player = Alpine.store('player')
        if (player.book && player.playing) player.togglePlay()
      })
      navigator.mediaSession.setActionHandler('nexttrack', () => {
        const player = Alpine.store('player')
        if (player.book && player.currentChapterIdx < player.book.chapters.length - 1) {
          player.jumpToChapter(player.currentChapterIdx + 1)
        }
      })
      navigator.mediaSession.setActionHandler('previoustrack', () => {
        const player = Alpine.store('player')
        if (player.book && player.currentChapterIdx > 0) {
          player.jumpToChapter(player.currentChapterIdx - 1)
        }
      })
      navigator.mediaSession.setActionHandler('seekto', (details) => {
        const player = Alpine.store('player')
        if (!player.book || !player.currentChapter) return
        const absoluteTime = seektoAbsolute(player.currentChapter, details.seekTime)
        if (absoluteTime !== null) {
          player.seek(absoluteTime)
          player._updatePositionState()
        }
      })
    }
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.8/dist/cdn.min.js"></script>
</body>
